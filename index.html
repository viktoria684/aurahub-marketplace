<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuraHub — Маркетплейс подработок</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid #e2e8f0;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #1a202c;
      text-decoration: none;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: #2b6cb0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }
    nav { display: flex; align-items: center; gap: 8px; }
    nav a {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #718096;
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: #1a202c; }
    .hero {
      position: relative;
      overflow: hidden;
      padding: 80px 16px 60px;
      text-align: center;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #e0e7ff 0%, #ddd6fe 30%, #fce7f3 60%, #fae8ff 100%);
      opacity: 0.5;
    }
    .hero-content {
      position: relative;
      max-width: 700px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #1a202c;
      margin-bottom: 12px;
    }
    .hero p {
      font-size: 18px;
      color: #718096;
      max-width: 550px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .categories {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }
    .grid {
      display: grid;
      gap: 24px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1024px) { .grid { grid-template-columns: 1fr 1fr 1fr 1fr; } }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1);
    }
    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      margin-bottom: 12px;
    }
    .card h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a202c;
    }
    .card p {
      font-size: 14px;
      color: #718096;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .card-link {
      font-size: 14px;
      font-weight: 500;
      color: #2b6cb0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tasks-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }
    .tasks-section h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1a202c;
    }
    .task-card {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .task-info h4 {
      font-size: 16px;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 4px;
    }
    .task-info p {
      font-size: 14px;
      color: #718096;
      line-height: 1.5;
    }
    .task-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .budget-badge {
      background: #edf2f7;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
    }
    .status-badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #38a169;
      color: #38a169;
    }
    .task-location {
      font-size: 13px;
      color: #718096;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    footer {
      border-top: 1px solid #e2e8f0;
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: #a0aec0;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-icon">✦</div>
        AuraHub
      </a>
      <nav>
        <a href="#" onclick="showAllTasks()">Каталог</a>
        <a href="#">Вход</a>
        <a href="#">Регистрация</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <h1>Найди подработку своей мечты</h1>
      <p>Тысячи заданий от проверенных клиентов. Работай удалённо, локально или посменно — выбирай формат, который подходит тебе.</p>
    </div>
  </section>

  <section class="categories">
    <div class="grid" id="categoriesGrid"></div>
  </section>

  <section class="tasks-section" id="tasksSection" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
      <h2 id="tasksTitle">Все задания</h2>
      <a href="#" onclick="showCategories()" style="font-size:14px; color:#2b6cb0; text-decoration:none">← На главную</a>
    </div>
    <div id="tasksList"></div>
  </section>

  <footer>© 2025 AuraHub</footer>

  <script>
    const categories = [
      { slug: "freelance", title: "Фриланс", description: "Удалённая работа: дизайн, разработка, копирайтинг, маркетинг и другие цифровые услуги.", icon: "💻", color: "#3b82f6" },
      { slug: "physical", title: "Физическая работа", description: "Локальные услуги: ремонт, уборка, грузоперевозки, помощь по дому и на участке.", icon: "🔨", color: "#ea580c" },
      { slug: "logistics", title: "Логистика", description: "Доставка и перевозки: курьерские услуги, грузоперевозки, экспедирование.", icon: "🚚", color: "#16a34a" },
      { slug: "shift", title: "Сменная работа", description: "Работа на складах, в логистике и на производстве: комплектовщики, грузчики, операторы линий.", icon: "📋", color: "#d97706" }
    ];
    const tasks = [
      { id: "1", title: "Разработать лендинг для кофейни", description: "Нужен одностраничный сайт с меню, контактами и формой заказа.", budget: "25 000 ₽", categorySlug: "freelance" },
      { id: "2", title: "Написать 10 статей для блога", description: "Темы: финансы, инвестиции. 2000-3000 знаков каждая.", budget: "15 000 ₽", categorySlug: "freelance" },
      { id: "3", title: "Дизайн презентации в Figma", description: "Корпоративная презентация на 15 слайдов.", budget: "8 000 ₽", categorySlug: "freelance" },
      { id: "4", title: "Собрать шкаф-купе", description: "Размер 2.4×2.0 м, инструкция прилагается.", budget: "5 000 ₽", location: "ул. Ленина, 45", categorySlug: "physical" },
      { id: "5", title: "Генеральная уборка квартиры", description: "Двухкомнатная квартира 55 м².", budget: "4 500 ₽", location: "пр. Мира, 23", categorySlug: "physical" },
      { id: "6", title: "Перевезти диван и холодильник", description: "Грузчик + газель на 2 часа.", budget: "3 000 ₽", location: "ул. Советская, 10", categorySlug: "physical" },
      { id: "7", title: "Курьер по городу", description: "Развозить документы и посылки по офисам.", budget: "40 000 ₽/мес", location: "Центральный район", categorySlug: "logistics" },
      { id: "8", title: "Водитель грузового авто", description: "Перевозка строительных материалов.", budget: "80 000 ₽/мес", location: "г. Екатеринбург", categorySlug: "logistics" },
      { id: "9", title: "Доставка товаров", description: "Развоз продуктов питания по магазинам.", budget: "35 000 ₽/мес", location: "ул. Продуктовая, 12", categorySlug: "logistics" },
      { id: "10", title: "Комплектовщик на склад", description: "Сборка заказов по терминалу. Ночная смена.", budget: "55 000 ₽/мес", location: "ул. Заводская, 1", categorySlug: "shift" },
      { id: "11", title: "Грузчик на производство", description: "Погрузка-выгрузка сырья. Сменный график.", budget: "45 000 ₽/мес", location: "промзона Северная", categorySlug: "shift" },
      { id: "12", title: "Оператор конвейерной линии", description: "Контроль работы оборудования.", budget: "50 000 ₽/мес", location: "Индустриальный парк, 12", categorySlug: "shift" }
    ];

    function renderCategories() {
      const grid = document.getElementById('categoriesGrid');
      grid.innerHTML = categories.map(cat => `
        <a href="#" class="card" onclick="showCategoryTasks('${cat.slug}'); return false;">
          <div class="card-icon" style="background:${cat.color}">${cat.icon}</div>
          <h3>${cat.title}</h3>
          <p>${cat.description}</p>
          <div class="card-link">Смотреть задания →</div>
        </a>
      `).join('');
    }

    function showCategoryTasks(slug) {
      const cat = categories.find(c => c.slug === slug);
      const filtered = tasks.filter(t => t.categorySlug === slug);
      document.querySelector('.categories').style.display = 'none';
      const section = document.getElementById('tasksSection');
      section.style.display = 'block';
      document.getElementById('tasksTitle').textContent = cat.title;
      document.getElementById('tasksList').innerHTML = filtered.map(t => `
        <div class="task-card">
          <div class="task-info">
            <h4>${t.title}</h4>
            <p>${t.description}</p>
            ${t.location ? `<div class="task-location">📍 ${t.location}</div>` : ''}
          </div>
          <div class="task-meta">
            <span class="budget-badge">${t.budget}</span>
            <span class="status-badge">Открыто</span>
          </div>
        </div>
      `).join('');
    }

    function showAllTasks() {
      document.querySelector('.categories').style.display = 'none';
      const section = document.getElementById('tasksSection');
      section.style.display = 'block';
      document.getElementById('tasksTitle').textContent = 'Все задания';
      document.getElementById('tasksList').innerHTML = tasks.map(t => {
        const cat = categories.find(c => c.slug === t.categorySlug);
        return `<div class="task-card">
          <div class="task-info">
            <h4>${t.title}</h4>
            <p>${t.description}</p>
            ${t.location ? `<div class="task-location">📍 ${t.location}</div>` : ''}
            <div style="font-size:12px;color:#a0aec0;margin-top:4px">${cat.title}</div>
          </div>
          <div class="task-meta">
            <span class="budget-badge">${t.budget}</span>
            <span class="status-badge">Открыто</span>
          </div>
        </div>`;
      }).join('');
    }

    function showCategories() {
      document.querySelector('.categories').style.display = 'block';
      document.getElementById('tasksSection').style.display = 'none';
    }

    renderCategories();
  </script>
</body>
</html>
